<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مطعم لابوتيك - La Boutique</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; }
        .hero { padding: 40px; background: #000; border-bottom: 3px solid #d4af37; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #222; padding: 15px; border-radius: 10px; border: 1px solid #d4af37; }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; }
        .btn { background: #d4af37; color: #000; padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 90%; font-size: 18px; }
        .footer { background: #d4af37; color: #000; padding: 30px; font-size: 26px; font-weight: bold; margin-top: 30px; }
        input, select { width: 90%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #555; background: #333; color: white; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>مطعم لابوتيك - La Boutique</h1>
        <p>إطلالة الأهرامات الساحرة</p>
    </div>

    <div class="grid">
        <div class="card">
            <img src="2.jpg" alt=" خطأ في الويب" />
            <h3>العائلات الملكية</h3>
            <p>من 6 إلى 12 شخص - مساحة واسعة وخصوصية</p>
        </div>
        <div class="card">
             <img src="1.jpg" alt="" />
            <h3>اجتماعات الشركات</h3>
            <p>من 10 إلى 20 شخص - بيئة احترافية ومرافق للتقديم</p>
        </div>
        <div class="card">
            <img src="4.jpg" alt=" خطا في الويب " />
            <h3>ركن الأصدقاء</h3>
            <p>من 4 إلى 8 أشخاص - أجواء مريحة وعصرية</p>
        </div>
    </div>

    <div style="max-width: 500px; margin: auto; padding: 20px;">
        <h2>احجز طاولتك الآن</h2>
        <form id="resForm">
            <input type="text" id="name" placeholder="الاسم" required>
            <input type="tel" id="phone" placeholder="رقم الهاتف" required>
            <select id="type">
                <option>عائلة (6-12 شخص)</option>
                <option>شركة (10-20 شخص)</option>
                <option>أصدقاء (4-8 أشخاص)</option>
            </select>
            <input type="datetime-local" id="date" required>
            <button type="submit" class="btn">تأكيد الحجز عبر واتساب</button>
        </form>
    </div>

    <div class="footer">
        للحجز والاستفسار المباشر:<br>
        01277872726
    </div>

    <script>
        document.getElementById('resForm').onsubmit = function(e) {
            e.preventDefault();
            let name = document.getElementById('name').value;
            let phone = document.getElementById('phone').value;
            let type = document.getElementById('type').value;
            let date = document.getElementById('date').value;
            let msg = `حجز جديد من مطعم لابوتيك:%0Aالاسم: ${name}%0Aالهاتف: ${phone}%0Aنوع الحجز: ${type}%0Aالموعد: ${date}`;
            window.open(`https://wa.me/201277872726?text=${msg}`, '_blank');
        };
    </script>
</body>
</html>
